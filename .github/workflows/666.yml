name: 666

on:
  schedule:
    # 北京时间10时50分
    - cron: '50 2 * * *'
  workflow_dispatch: # 允许手动触发工作流，方便测试

jobs:
  sync-and-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要写入权限来推送代码
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6.0.2

      - name: 下载并处理IP列表
        run: |
          # 下载源文件
          curl -o china46.txt https://gaoyifan.github.io/china-operator-ip/china46.txt
          
          # 处理文件: 每行前加 @@
          awk '{print "@@" $0}' china46.txt > temp.txt
          
          # 在最后添加指定内容
          echo "/^\\d*\\.\\d*\\.\\d*\\.\\d*$/" >> temp.txt
          echo "/\\:{2,}/" >> temp.txt
          echo "@@||time.windows.com^" >> temp.txt
          echo "@@||cdn.jsdelivr.net^" >> temp.txt
          echo "@@||purge.jsdelivr.net^" >> temp.txt
          echo "@@||pool.ntp.org^" >> temp.txt
          echo "@@||dns.google^" >> temp.txt
          echo "@@||google.com^" >> temp.txt
          echo "@@||jxguo.com^" >> temp.txt
          echo "@@||adguard.com^" >> temp.txt
          echo "@@||adguard.org^" >> temp.txt
          echo "@@||adguard-dns.io^" >> temp.txt
          echo "@@||adguard.info^" >> temp.txt
          echo "@@||adtidy.org^" >> temp.txt
          echo "@@||outlook.com^" >> temp.txt
          echo "@@||googleapis.com^" >> temp.txt
          echo "@@224.0.0.0/3" >> temp.txt
          echo "@@203.0.113.0/24" >> temp.txt
          echo "@@198.51.100.0/24" >> temp.txt
          echo "@@198.18.0.0/15" >> temp.txt
          echo "@@192.175.48.0/24" >> temp.txt
          echo "@@192.168.0.0/16" >> temp.txt
          echo "@@192.88.99.0/24" >> temp.txt
          echo "@@192.52.193.0/24" >> temp.txt
          echo "@@192.31.196.0/24" >> temp.txt
          echo "@@192.0.2.0/24" >> temp.txt
          echo "@@192.0.0.0/24" >> temp.txt
          echo "@@172.16.0.0/12" >> temp.txt
          echo "@@169.254.0.0/16" >> temp.txt
          echo "@@127.0.0.0/8" >> temp.txt
          echo "@@100.64.0.0/10" >> temp.txt
          echo "@@10.0.0.0/8" >> temp.txt
          echo "@@0.0.0.0/8" >> temp.txt
          echo "@@ff00::/8" >> temp.txt
          echo "@@fe80::/10" >> temp.txt
          echo "@@fc00::/7" >> temp.txt
          echo "@@2620:4f:8000::/48" >> temp.txt
          echo "@@2002::/16" >> temp.txt
          echo "@@2001:db8::/32" >> temp.txt
          echo "@@2001::/23" >> temp.txt
          echo "@@100::/64" >> temp.txt
          echo "@@64:ff9b:1::/48" >> temp.txt
          echo "@@64:ff9b::/96" >> temp.txt
          echo "@@::ffff:0:0/96" >> temp.txt
          echo "@@::/127" >> temp.txt
          
          # 将结果保存为666.txt
          mv temp.txt 666.txt
          
          # 清理下载的源文件
          rm china46.txt
          
          # 显示处理完成的消息（可选，用于日志）
          echo "处理完成，最终内容预览："
          head -n 5 666.txt
          echo "..."
          tail -n 5 666.txt

      - name: 提交并推送更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 666.txt
          # 仅当文件有变动时才提交，保留日期信息
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新: 666 $(date +'%Y-%m-%d')"
          git push
