name: 666

on:
  schedule:
    # 北京时间13点
    - cron: '0 5 * * *'
  workflow_dispatch: # 允许手动触发工作流，方便测试

jobs:
  sync-and-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要写入权限来推送代码
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6.0.2

      - name: 下载并处理IP列表
        run: |
          # 下载源文件
          curl -o china46.txt https://china-operator-ip.yfgao.com/china46.txt
          
          # 处理文件: 每行前加 @@
          awk '{print "@@" $0}' china46.txt > temp.txt
          
          # 在最后添加指定内容
          echo "/^\\d*\\.\\d*\\.\\d*\\.\\d*$/" >> temp.txt
          echo "/\\:{2,}/" >> temp.txt
          
          # 将结果保存为666.txt
          mv temp.txt 666.txt
          
          # 清理下载的源文件
          rm china46.txt
          
          # 显示处理完成的消息（可选，用于日志）
          echo "处理完成，最终内容预览："
          head -n 5 666.txt
          echo "..."
          tail -n 5 666.txt

      - name: 提交并推送更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 666.txt
          # 仅当文件有变动时才提交，保留日期信息
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新: 666 $(date +'%Y-%m-%d')"
          git push
